steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pytest mypy ruff

  - name: Run lint (ruff)
    run: |
      ruff check .

  - name: Check formatting
    run: |
      ruff format --check .

  - name: Run mypy
    run: |
      mypy .

  - name: Run tests
    run: |
      pytest