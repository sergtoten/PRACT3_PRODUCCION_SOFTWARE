name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-bdd mypy ruff

      # -------------------------
      # LINT
      # -------------------------
      - name: Run lint (ruff)
        run: |
          ruff check .

      # -------------------------
      # FORMAT
      # -------------------------
      - name: Check formatting
        run: |
          ruff format --check .

      # -------------------------
      # MYPY
      # -------------------------
      - name: Run mypy
        run: |
          mypy .

      # -------------------------
      # TESTS
      # -------------------------
      - name: Run tests
        run: |
          pytest